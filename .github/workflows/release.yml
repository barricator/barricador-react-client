name: Release

# Publishes the React SDK to npm when a version tag is pushed (e.g. v1.0.0).
# Publishes with provenance. Set the NPM_TOKEN secret to an npm automation token for the
# @barricator org (npmjs.com → Access Tokens → Granular/Automation).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # enables npm provenance attestations

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
